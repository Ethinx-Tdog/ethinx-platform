name: Catalog Validate

on:
  push:
    paths:
      - "catalog/**"
      - ".github/workflows/catalog_validate.yml"
  pull_request:
    paths:
      - "catalog/**"
      - ".github/workflows/catalog_validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Validate catalog
        run: |
          python catalog/validate_catalog.py
